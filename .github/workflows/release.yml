name: 📱 Build & Release

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]  # Trigger en release tags
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:  # Permitir ejecutar manualmente

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: latest-stable

jobs:
  build:
    name: Build & Archive
    runs-on: macos-latest
    
    outputs:
      build-status: ${{ job.status }}
    
    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          # CocoaPods
          if [ -f "Podfile" ]; then
            echo "Installing pods..."
            sudo gem install cocoapods
            pod install
          fi
          
          # Swift Package Manager
          if [ -f "Package.swift" ]; then
            echo "Resolving Swift packages..."
            swift package resolve
          fi
      
      - name: 🔨 Build for Simulator
        run: |
          xcodebuild \
            -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            build
      
      - name: 🔨 Build for Device
        if: success()
        run: |
          xcodebuild \
            -scheme iOSAppDriver \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            build
      
      - name: 📦 Archive for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild \
            -scheme iOSAppDriver \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/iOSAppDriver.xcarchive" \
            archive
      
      - name: 📲 Export IPA
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "build/iOSAppDriver.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "build/ipa" \
            || echo "⚠️  Export IPA skipped (signing required)"
      
      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            build/
          retention-days: 30
      
      - name: 🏷️  Create Release
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: ✅ Build Success
        if: needs.build.outputs.build-status == 'success'
        run: echo "🎉 Build completed successfully!"
      
      - name: ❌ Build Failed
        if: needs.build.outputs.build-status == 'failure'
        run: exit 1
