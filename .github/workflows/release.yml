name: 📱 Build & Release

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: latest-stable

jobs:
  build:
    name: Build & Verify
    runs-on: macos-latest
    
    outputs:
      build-status: ${{ job.status }}
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      
      - name: 🔨 Build for Simulator (Debug)
        run: |
          xcodebuild -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      - name: 🔨 Build for Simulator (Release)
        run: |
          xcodebuild -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: build/Build/Products/
          retention-days: 30
      
      - name: 🏷️ Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: ✅ Build Success
        if: needs.build.outputs.build-status == 'success'
        run: echo "🎉 Build completed successfully!"
      
      - name: ❌ Build Failed
        if: needs.build.outputs.build-status == 'failure'
        run: exit 1
