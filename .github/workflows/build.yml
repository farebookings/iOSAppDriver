name: 🍎 Build iOS App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Generate Xcode Project (if missing)
        run: |
          if [ ! -f "iOSAppDriver.xcodeproj/project.pbxproj" ]; then
            echo "📦 Xcode project missing, attempting to generate..."
            if command -v xcodeproj &>/dev/null; then
              sudo gem install xcodeproj --no-document --verbose 2>&1 || true
              xcodeproj generate-xcodeproj --path . || echo "⚠️ Generation attempt completed"
            fi
          fi
          
          if [ -f "iOSAppDriver.xcodeproj/project.pbxproj" ]; then
            echo "✅ Xcode project ready"
          else
            echo "❌ ERROR: Xcode project not found"
            exit 1
          fi
        working-directory: ${{ github.workspace }}
      
      - name: Install dependencies (CocoaPods)
        run: |
          if [ -f "Podfile" ]; then
            sudo gem install cocoapods
            pod install
          fi
        working-directory: ${{ github.workspace }}
      
      - name: Build iOS App
        run: |
          xcodebuild \
            -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -verbose build
        working-directory: ${{ github.workspace }}
      
      - name: Run Tests (if available)
        run: |
          xcodebuild -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -enableCodeCoverage YES \
            test 2>&1 || echo "No tests available"
        working-directory: ${{ github.workspace }}
      
      - name: Archive Build
        if: success()
        run: |
          xcodebuild \
            -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/iOSAppDriver.xcarchive" \
            archive
        working-directory: ${{ github.workspace }}
      
      - name: Generate IPA
        if: success()
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/iOSAppDriver.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "build/output"
        working-directory: ${{ github.workspace }}
        continue-on-error: true
      
      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 30
      
      - name: Notify Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed!"
          fi
