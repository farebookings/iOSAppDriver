name: 🍎 Build iOS App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Validate project structure
        run: |
          echo "📋 Project targets and schemes:"
          xcodebuild -project iOSAppDriver.xcodeproj -list
          
          echo ""
          echo "✅ Source files:"
          find Sources -name "*.swift" -type f
          
          echo ""
          echo "✅ Checking Info.plist..."
          [ -f Info.plist ] && echo "  Info.plist found ✅" || (echo "❌ Info.plist missing" && exit 1)
      
      - name: Build for Simulator (Debug)
        run: |
          echo "🔨 Building Debug for simulator..."
          xcodebuild -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee build-debug.log
      
      - name: Build for Simulator (Release)
        run: |
          echo "🔨 Building Release for simulator..."
          xcodebuild -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build-release.log
      
      - name: Run Tests
        run: |
          xcodebuild -project iOSAppDriver.xcodeproj \
            -scheme iOSAppDriver \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 || echo "⚠️ No tests defined (expected)"
      
      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/Build/Products/
            build-debug.log
            build-release.log
          retention-days: 30
      
      - name: Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build & tests passed!"
          else
            echo "❌ Build failed — check logs above"
            exit 1
          fi
